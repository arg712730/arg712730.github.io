<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量白底图 · 透明图 — 800×800</title>
<style>
:root {
  --bg: #f8f9fb;
  --card: #fff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text2: #6b7280;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --primary-light: #eef2ff;
  --success: #059669;
  --danger: #dc2626;
  --radius: 12px;
  --shadow: 0 1px 3px rgb(0 0 0 / .06);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / .07);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px;
}
.header h1 { font-size: 17px; font-weight: 700; }
.badge {
  font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500;
  white-space: nowrap;
}

/* Container */
.container {
  max-width: 1200px; margin: 0 auto; padding: 20px;
  display: grid; grid-template-columns: 420px 1fr; gap: 20px;
}
@media (max-width: 860px) { .container { grid-template-columns: 1fr; } }

/* Card */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
}
.card-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.card-header h3 { font-size: 14px; font-weight: 600; }
.card-body { padding: 16px; }
.card-body.nopad { padding: 0; }

/* Upload */
.upload-zone {
  border: 2px dashed #d1d5db; border-radius: 10px;
  padding: 28px 16px; text-align: center; cursor: pointer;
  transition: all .2s; background: #fafbfc;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--primary); background: var(--primary-light);
}
.upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
.upload-zone .title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.upload-zone .hint { font-size: 12px; color: var(--text2); }
.upload-zone input[type="file"] { display: none; }

/* File list */
.file-list { max-height: 280px; overflow-y: auto; margin-top: 10px; }
.file-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border: 1px solid var(--border);
  border-radius: 7px; margin-bottom: 5px; font-size: 13px;
}
.file-thumb {
  width: 38px; height: 38px; border-radius: 5px;
  object-fit: cover; border: 1px solid var(--border); flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-output { font-size: 11px; color: var(--text2); }
.file-remove {
  width: 24px; height: 24px; border: none; background: #fee2e2;
  color: #dc2626; border-radius: 5px; cursor: pointer; font-size: 12px;
  flex-shrink: 0; transition: .15s;
}
.file-remove:hover { background: #fecaca; }

/* Settings */
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid #f3f4f6;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 12px; font-weight: 500; }
.setting-control select, .setting-control input {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px;
  font-size: 12px; font-family: inherit; background: #fff;
}
.setting-control select { min-width: 110px; }
.setting-control input[type="number"] { width: 60px; text-align: center; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 9px 16px; border: none; border-radius: 7px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover:not(:disabled) { background: #f9fafb; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { background: #047857; }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 5px; }

/* Progress */
.progress-wrap { padding: 14px 0 0; }
.progress-bar-outer { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 3px; transition: width .3s; }
.progress-text { font-size: 12px; color: var(--text2); }

/* Results grid */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
  max-height: 65vh; overflow-y: auto;
}
.result-card {
  border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; background: var(--card);
  transition: box-shadow .2s;
}
.result-card:hover { box-shadow: var(--shadow-md); }
.result-preview {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  position: relative; cursor: pointer;
}
.result-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.result-preview .tag {
  position: absolute; bottom: 3px; right: 3px;
  font-size: 10px; background: rgba(0,0,0,.55); color: #fff;
  padding: 2px 5px; border-radius: 3px;
}
.result-info { padding: 6px 8px; border-top: 1px solid var(--border); }
.result-name {
  font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.result-actions { display: flex; gap: 3px; }
.result-actions button {
  flex: 1; padding: 3px 5px; font-size: 10px;
  border: 1px solid var(--border); border-radius: 3px;
  background: #fff; cursor: pointer; transition: .1s;
  white-space: nowrap;
}
.result-actions button:hover { background: #f3f4f6; }
.result-actions button.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* Checkerboard */
.checkerboard {
  background-image:
    linear-gradient(45deg, #e8e8e8 25%, transparent 25%),
    linear-gradient(-45deg, #e8e8e8 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e8e8e8 75%),
    linear-gradient(-45deg, transparent 75%, #e8e8e8 75%);
  background-size: 14px 14px;
  background-position: 0 0, 0 7px, 7px -7px, -7px 0px;
}
.white-bg { background: #fff; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 16px; color: var(--text2); }
.empty-state .icon { font-size: 40px; margin-bottom: 8px; }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,.85);
  z-index: 999; display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }

/* Toast */
.toast {
  position: fixed; top: 16px; right: 16px;
  padding: 10px 18px; border-radius: 7px;
  font-size: 13px; font-weight: 500;
  z-index: 1000; animation: slideIn .3s ease;
  box-shadow: 0 8px 20px rgb(0 0 0 / .12);
}
.toast-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
.toast-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.toast-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid #e5e7eb;
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🎨</div>
    <div>
      <h1>批量白底图 · 透明图 <span style="font-weight:400;font-size:13px;color:var(--text2);">— 800×800 正方形输出</span></h1>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <span class="badge" style="background:#ecfdf5;color:#059669;">🆓 完全免费</span>
    <span class="badge" style="background:#eff6ff;color:#2563eb;">🔒 本地处理不上传</span>
    <span class="badge" style="background:#fef3c7;color:#92400e;">🌐 首次需下载AI模型~40MB</span>
  </div>
</div>

<div class="container">
  <!-- Left panel -->
  <div>
    <div class="card" style="margin-bottom:14px;">
      <div class="card-header">
        <h3>📤 上传插画</h3>
        <span style="font-size:12px;color:var(--text2);" id="file-count">0 张</span>
      </div>
      <div class="card-body" style="padding-top:0;">
        <div class="upload-zone" id="upload-zone">
          <div class="icon">🖼️</div>
          <div class="title">拖拽图片到此处 或 点击上传</div>
          <div class="hint">支持 JPG / PNG / WebP · 可批量 · Ctrl+V 粘贴</div>
          <input type="file" id="file-input" accept="image/*" multiple>
        </div>
        <div class="file-list" id="file-list"></div>
      </div>
      <div style="padding:0 16px 14px;display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" id="btn-clear" disabled>清空列表</button>
        <button class="btn btn-outline btn-sm" id="btn-add-more">+ 添加更多</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="card-header"><h3>⚙️ 设置</h3></div>
      <div class="card-body" style="padding:6px 16px;">
        <div class="setting-row">
          <span class="setting-label">输出尺寸</span>
          <div class="setting-control">
            <select id="set-size">
              <option value="600">600×600</option>
              <option value="800" selected>800×800</option>
              <option value="1000">1000×1000</option>
              <option value="1200">1200×1200</option>
            </select>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">处理精度</span>
          <div class="setting-control">
            <select id="set-precision">
              <option value="1024">快速 (1024px)</option>
              <option value="1500" selected>标准 (1500px)</option>
              <option value="2048">高精 (2048px)</option>
            </select>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">JPEG质量</span>
          <div class="setting-control">
            <input type="number" id="set-quality" value="95" min="60" max="100" step="5">
            <span style="font-size:12px;color:var(--text2);">%</span>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="btn-process" disabled style="width:100%;justify-content:center;padding:12px;">
      🚀 开始批量处理
    </button>
    <div id="progress-area"></div>
  </div>

  <!-- Right panel: Results -->
  <div>
    <div class="card">
      <div class="card-header">
        <h3>✨ 处理结果</h3>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" id="btn-view-transparent" style="display:none;">透明预览</button>
          <button class="btn btn-outline btn-sm" id="btn-view-white" style="display:none;">白底预览</button>
          <button class="btn btn-success btn-sm" id="btn-download-all" style="display:none;">📦 打包下载全部</button>
        </div>
      </div>
      <div class="card-body nopad" style="padding:14px;">
        <div id="results-area">
          <div class="empty-state">
            <div class="icon">📭</div>
            <p style="font-size:13px;">上传插画并开始处理后<br>结果会显示在这里</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "@imgly/background-removal": "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/browser.mjs" } }
</script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script type="module">
import { removeBackground } from '@imgly/background-removal';

// ========== State ==========
const state = {
  files: new Map(),        // id -> { file, thumbUrl, status, displayName }
  results: new Map(),      // id -> { transparentBlob, whiteBlob, transparentUrl, whiteUrl, displayName }
  processing: false,
  previewMode: 'transparent',
  settings: { outSize: 800, precision: 1500, quality: 0.95 }
};

// ========== DOM ==========
const $ = s => document.querySelector(s);
const uploadZone = $('#upload-zone');
const fileInput = $('#file-input');
const fileList = $('#file-list');
const fileCount = $('#file-count');
const btnClear = $('#btn-clear');
const btnAddMore = $('#btn-add-more');
const btnProcess = $('#btn-process');
const btnDownloadAll = $('#btn-download-all');
const btnViewTransparent = $('#btn-view-transparent');
const btnViewWhite = $('#btn-view-white');
const progressArea = $('#progress-area');
const resultsArea = $('#results-area');

// ========== Toast ==========
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ========== Helpers ==========
let idCounter = 0;
function genId() { return `f${++idCounter}_${Date.now()}`; }
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s; return d.innerHTML;
}
function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
function baseName(fileName) {
  return fileName.replace(/\.[^.]+$/, '');
}

// ========== File Management ==========
function addFiles(fileArray) {
  if (!fileArray?.length) return;
  const valid = ['image/jpeg','image/png','image/webp','image/bmp','image/gif','image/tiff'];
  let added = 0;
  for (const f of fileArray) {
    if (!valid.includes(f.type)) { toast(`跳过 "${f.name}"：不支持的格式`, 'error'); continue; }
    const id = genId();
    state.files.set(id, {
      file: f,
      thumbUrl: URL.createObjectURL(f),
      status: 'waiting',
      displayName: baseName(f.name)
    });
    added++;
  }
  if (added > 0) { renderFileList(); toast(`已添加 ${added} 张`, 'success'); }
}

function removeFile(id) {
  const f = state.files.get(id);
  if (f?.thumbUrl) URL.revokeObjectURL(f.thumbUrl);
  state.files.delete(id);
  state.results.delete(id);
  renderFileList(); renderResults();
}

function clearAll() {
  for (const f of state.files.values()) { if (f.thumbUrl) URL.revokeObjectURL(f.thumbUrl); }
  state.files.clear();
  for (const r of state.results.values()) {
    if (r.transparentUrl) URL.revokeObjectURL(r.transparentUrl);
    if (r.whiteUrl) URL.revokeObjectURL(r.whiteUrl);
  }
  state.results.clear();
  progressArea.innerHTML = '';
  renderFileList(); renderResults();
}

// ========== Render File List ==========
function renderFileList() {
  const entries = [...state.files.entries()];
  fileCount.textContent = `${entries.length} 张`;

  if (!entries.length) {
    fileList.innerHTML = '<div class="empty-state" style="padding:16px;"><p style="font-size:12px;">还没有添加图片</p></div>';
    btnClear.disabled = true;
    btnProcess.disabled = true;
  } else {
    fileList.innerHTML = entries.map(([id, f]) => `
      <div class="file-item">
        <img class="file-thumb" src="${f.thumbUrl}" alt="">
        <div class="file-info">
          <div class="file-name" title="${escapeHtml(f.file.name)}">${escapeHtml(f.file.name)}</div>
          <div class="file-output">
            → ${escapeHtml(f.displayName)}（白底图）.jpg / ${escapeHtml(f.displayName)}（透明图）.png
            ${f.status === 'done' ? ' ✅' : f.status === 'error' ? ' ❌' : f.status === 'processing' ? ' ⏳' : ''}
          </div>
        </div>
        ${(f.status === 'waiting' || f.status === 'error') ? `<button class="file-remove" data-rm="${id}">✕</button>` : ''}
      </div>
    `).join('');
    btnClear.disabled = state.processing;
    const hasWaiting = entries.some(([,f]) => f.status === 'waiting' || f.status === 'error');
    btnProcess.disabled = !hasWaiting || state.processing;
  }
  updateActionBtns();
  // bind remove
  fileList.querySelectorAll('[data-rm]').forEach(b => b.onclick = e => { e.stopPropagation(); removeFile(b.dataset.rm); });
}

// ========== Image Processing ==========

/** Scale image so longest side ≤ maxPx */
async function scaleImage(file, maxPx) {
  if (!maxPx) return file;
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const long = Math.max(img.width, img.height);
      if (long <= maxPx) return resolve(file);
      const s = maxPx / long;
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * s);
      c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(blob => resolve(new File([blob], file.name, { type: 'image/png' })), 'image/png');
    };
    img.src = url;
  });
}

/** Load blob as Image */
function loadImage(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(blob);
  });
}

/** Find bounding box of non-transparent content */
function findContentBounds(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Sample every N pixels for speed (accuracy still fine at step=2 or 3)
  const step = img.width > 1500 ? 3 : 2;
  const idata = ctx.getImageData(0, 0, img.width, img.height);
  const d = idata.data;
  let minX = img.width, minY = img.height, maxX = -1, maxY = -1;

  for (let y = 0; y < img.height; y += step) {
    for (let x = 0; x < img.width; x += step) {
      if (d[(y * img.width + x) * 4 + 3] > 20) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }

  // Fine-tune edges with full scan around found bounds
  if (maxX < 0) {
    // Fully transparent — use full image
    return { minX: 0, minY: 0, maxX: img.width - 1, maxY: img.height - 1 };
  }

  // Expand by step to account for skipped pixels, then clamp
  minX = Math.max(0, minX - step);
  minY = Math.max(0, minY - step);
  maxX = Math.min(img.width - 1, maxX + step);
  maxY = Math.min(img.height - 1, maxY + step);

  return { minX, minY, maxX, maxY };
}

/** Process one image: remove bg → find bounds → fit into square */
async function processOne(file, displayName, outSize, precisionPx, jpegQuality) {
  // 1. Scale for processing
  const scaled = await scaleImage(file, precisionPx);

  // 2. Remove background
  const transparentBlob = await removeBackground(scaled, {
    model: 'isnet_quint8',
    output: { format: 'image/png', quality: 1 },
    progress: null
  });

  // 3. Load & find content bounds
  const img = await loadImage(transparentBlob);
  const bounds = findContentBounds(img);

  const contentW = bounds.maxX - bounds.minX + 1;
  const contentH = bounds.maxY - bounds.minY + 1;
  const contentLong = Math.max(contentW, contentH);

  // 4. Create output canvas (square)
  const out = document.createElement('canvas');
  out.width = outSize; out.height = outSize;

  // 5. Calculate draw params: scale content to fit square, centered
  const scale = outSize / contentLong;
  const dw = contentW * scale;
  const dh = contentH * scale;
  const dx = (outSize - dw) / 2;
  const dy = (outSize - dh) / 2;

  // 6. Transparent PNG
  const ctxT = out.getContext('2d');
  ctxT.clearRect(0, 0, outSize, outSize);
  ctxT.drawImage(img, bounds.minX, bounds.minY, contentW, contentH, dx, dy, dw, dh);
  const finalTransparentBlob = await new Promise(r => out.toBlob(r, 'image/png'));

  // 7. White bg JPEG
  const ctxW = out.getContext('2d');
  ctxW.fillStyle = '#FFFFFF';
  ctxW.fillRect(0, 0, outSize, outSize);
  ctxW.drawImage(img, bounds.minX, bounds.minY, contentW, contentH, dx, dy, dw, dh);
  const finalWhiteBlob = await new Promise(r => out.toBlob(r, 'image/jpeg', jpegQuality));

  // Clean up temp blob URL
  URL.revokeObjectURL(img.src);

  return { transparentBlob: finalTransparentBlob, whiteBlob: finalWhiteBlob };
}

// ========== Batch Process ==========
async function processAll() {
  if (state.processing) return;
  state.processing = true;
  updateActionBtns();
  renderFileList();

  const waiting = [...state.files.entries()].filter(([,f]) => f.status === 'waiting' || f.status === 'error');
  if (!waiting.length) { state.processing = false; updateActionBtns(); return; }

  const { outSize, precision, quality } = state.settings;
  const total = waiting.length;
  let done = 0, failed = 0;

  renderProgress(0, total, '准备中…');
  toast('⏳ 首次使用需下载AI模型（约40MB），后续秒开', 'info');

  for (const [id, f] of waiting) {
    f.status = 'processing';
    renderFileList();
    renderProgress(done, total, `正在处理: ${f.file.name}`);

    try {
      const result = await processOne(f.file, f.displayName, outSize, precision, quality);
      f.status = 'done';
      state.results.set(id, {
        transparentBlob: result.transparentBlob,
        whiteBlob: result.whiteBlob,
        transparentUrl: URL.createObjectURL(result.transparentBlob),
        whiteUrl: URL.createObjectURL(result.whiteBlob),
        displayName: f.displayName
      });
      done++;
    } catch (err) {
      console.error('Process error:', err);
      f.status = 'error';
      f.error = err.message;
      failed++;
    }

    renderFileList();
    renderResults();
    renderProgress(done, total,
      failed ? `${done}/${total} 完成，${failed} 失败` : `${done}/${total} 完成`);
  }

  state.processing = false;
  updateActionBtns();
  renderFileList();
  renderProgress(done, total, done ? `✅ 完成！成功 ${done} 张` + (failed ? `，失败 ${failed} 张` : '') : '');
  if (done) toast(`处理完成！成功 ${done} 张`, 'success');
}

function renderProgress(done, total, text) {
  const pct = total ? Math.round(done / total * 100) : 0;
  progressArea.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
      <div class="progress-text">${text} (${pct}%)</div>
    </div>`;
}

// ========== Render Results ==========
function renderResults() {
  const entries = [...state.results.entries()];
  if (!entries.length) {
    resultsArea.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p style="font-size:13px;">上传插画并开始处理后<br>结果会显示在这里</p></div>';
    btnDownloadAll.style.display = 'none';
    btnViewTransparent.style.display = 'none';
    btnViewWhite.style.display = 'none';
    return;
  }

  const isTransparent = state.previewMode === 'transparent';

  resultsArea.innerHTML = `
    <div class="results-grid">
      ${entries.map(([id, r]) => `
        <div class="result-card">
          <div class="result-preview ${isTransparent ? 'checkerboard' : 'white-bg'}" data-lb="${id}" data-mode="${state.previewMode}">
            <img src="${isTransparent ? r.transparentUrl : r.whiteUrl}" alt="${r.displayName}">
            <span class="tag">${isTransparent ? '透明' : '白底'}</span>
          </div>
          <div class="result-info">
            <div class="result-name" title="${r.displayName}">${escapeHtml(r.displayName)}</div>
            <div class="result-actions">
              <button class="active" data-v="${id}" data-m="transparent">透明</button>
              <button data-v="${id}" data-m="white">白底</button>
              <button data-dl="${id}" data-m="transparent" title="下载透明图">⬇</button>
              <button data-dl="${id}" data-m="white" title="下载白底图">⬇</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  // Bind: lightbox
  resultsArea.querySelectorAll('[data-lb]').forEach(el => {
    el.onclick = e => {
      if (e.target.closest('button')) return;
      const r = state.results.get(el.dataset.lb);
      if (!r) return;
      const url = el.dataset.mode === 'transparent' ? r.transparentUrl : r.whiteUrl;
      showLightbox(url);
    };
  });

  // Bind: view toggle per card
  resultsArea.querySelectorAll('[data-v]').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const id = btn.dataset.v, mode = btn.dataset.m;
      const r = state.results.get(id); if (!r) return;
      const card = btn.closest('.result-card');
      const preview = card.querySelector('.result-preview');
      const img = preview.querySelector('img');
      const tag = preview.querySelector('.tag');
      if (mode === 'transparent') {
        preview.className = 'result-preview checkerboard';
        preview.dataset.mode = 'transparent';
        img.src = r.transparentUrl;
        tag.textContent = '透明';
      } else {
        preview.className = 'result-preview white-bg';
        preview.dataset.mode = 'white';
        img.src = r.whiteUrl;
        tag.textContent = '白底';
      }
      card.querySelectorAll('[data-v]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  // Bind: single download
  resultsArea.querySelectorAll('[data-dl]').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const id = btn.dataset.dl, mode = btn.dataset.m;
      const r = state.results.get(id); if (!r) return;
      const blob = mode === 'transparent' ? r.transparentBlob : r.whiteBlob;
      const ext = mode === 'transparent' ? 'png' : 'jpg';
      const suffix = mode === 'transparent' ? '（透明图）' : '（白底图）';
      triggerDownload(blob, `${r.displayName}${suffix}.${ext}`);
    };
  });

  btnDownloadAll.style.display = 'inline-flex';
  btnViewTransparent.style.display = 'inline-flex';
  btnViewWhite.style.display = 'inline-flex';
  btnViewTransparent.classList.toggle('active', state.previewMode === 'transparent');
  btnViewWhite.classList.toggle('active', state.previewMode === 'white');
}

// ========== Lightbox ==========
function showLightbox(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${url}" alt="预览">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// ========== Download ==========
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function downloadAllZip() {
  const entries = [...state.results.entries()];
  if (!entries.length) return toast('没有可下载的结果', 'error');
  toast('正在打包…', 'info');

  const zip = new JSZip();
  const tf = zip.folder('透明图');
  const wf = zip.folder('白底图');

  for (const [, r] of entries) {
    tf.file(`${r.displayName}（透明图）.png`, r.transparentBlob);
    wf.file(`${r.displayName}（白底图）.jpg`, r.whiteBlob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const now = new Date();
  const ds = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  triggerDownload(zipBlob, `白底图_透明图_${ds}.zip`);
  toast('✅ 打包下载已开始', 'success');
}

// ========== UI Updates ==========
function updateActionBtns() {
  const hasResults = state.results.size > 0;
  btnDownloadAll.style.display = hasResults ? 'inline-flex' : 'none';
  btnViewTransparent.style.display = hasResults ? 'inline-flex' : 'none';
  btnViewWhite.style.display = hasResults ? 'inline-flex' : 'none';
}

// ========== Event Listeners ==========
uploadZone.onclick = () => fileInput.click();
uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('drag-over'); };
uploadZone.ondragleave = () => uploadZone.classList.remove('drag-over');
uploadZone.ondrop = e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
};
fileInput.onchange = () => { addFiles([...fileInput.files]); fileInput.value = ''; };
btnAddMore.onclick = () => fileInput.click();
btnClear.onclick = () => { if (!state.processing) clearAll(); };
btnProcess.onclick = processAll;
btnDownloadAll.onclick = downloadAllZip;
btnViewTransparent.onclick = () => { state.previewMode = 'transparent'; renderResults(); };
btnViewWhite.onclick = () => { state.previewMode = 'white'; renderResults(); };

// Settings
$('#set-size').onchange = e => { state.settings.outSize = +e.target.value; };
$('#set-precision').onchange = e => { state.settings.precision = +e.target.value; };
$('#set-quality').oninput = e => { state.settings.quality = +e.target.value / 100; };

// Paste
document.onpaste = e => {
  const items = [...e.clipboardData.items].filter(i => i.type.startsWith('image/'));
  if (items.length) {
    e.preventDefault();
    addFiles(items.map(i => i.getAsFile()).filter(Boolean));
    toast(`从剪贴板添加了 ${items.length} 张`, 'success');
  }
};

// Ctrl+Enter → process
document.onkeydown = e => {
  if (e.ctrlKey && e.key === 'Enter' && !state.processing && !btnProcess.disabled) {
    e.preventDefault(); processAll();
  }
};

console.log('🎨 批量白底图 · 透明图工具 已就绪');
console.log('  输出: 800×800 正方形');
console.log('  命名: 型号（白底图）.jpg / 型号（透明图）.png');
console.log('  主体自适应居中布局');
