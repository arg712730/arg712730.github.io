<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>画布隧道跳转</title>
<script>
fetch('tunnel_url.txt')
  .then(r => r.text())
  .then(url => {
    var u = url.trim();
    if (u.startsWith('https://')) {
      window.location.href = u;
      document.getElementById('msg').textContent = '正在跳转到画布...';
    } else {
      document.getElementById('msg').textContent = '隧道未启动，请稍后再试';
    }
  })
  .catch(() => {
    document.getElementById('msg').textContent = '无法获取隧道地址';
  });
</script>
<style>
body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#0f0f1a; color:#e0e0e0; }
</style>
</head>
<body><p id="msg">正在连接...</p></body>
</html>
