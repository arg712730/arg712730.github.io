function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderProducts(tab){
  const list = DATA[tab];
  const c = document.getElementById('tab-'+tab);
  let h = '<div class="product-list">';
  list.forEach((p,idx)=>{
    const plat = p.type&&(p.type.includes('天猫')||p.type.includes('tmall'))?'tmall':'taobao';

    h += '<div class="product-card">';
    h += '<div class="card-img"><img src="'+esc(p.img)+'" onerror="this.style.opacity=0" loading="lazy"><div class="rank-tag">No.'+(idx+1)+'</div></div>';
    h += '<div class="card-body">';
    h += '<div class="card-title" title="'+esc(p.name)+'">'+esc(p.name)+'</div>';
    h += '<div class="card-shop">店铺: '+esc(p.shop)+' <span class="plat '+plat+'">'+pl+'</span></div>';
    h += '<div class="card-pid">商品ID: '+esc(p.pid)+' <span class="copy-btn" onclick="navigator.clipboard.writeText(\''+p.pid+'\')" title="复制">📋</span></div>';
    h += '<div class="idx-row">';
    h += '<div class="idx-item i1"><div class="val">'+(p.growthIdx/1).toFixed(1)+'</div><div class="lbl">增长潜力指数</div></div>';
    h += '<div class="idx-item i2"><div class="val">'+(p.topIdx/1).toFixed(1)+'</div><div class="lbl">头部精选指数</div></div>';
    h += '<div class="idx-item i3"><div class="val">'+(p.powerIdx/1).toFixed(1)+'</div><div class="lbl">综合实力指数</div></div>';
    h += '<div class="idx-item i4"><div class="val">'+(p.stableIdx/1).toFixed(1)+'</div><div class="lbl">稳定表现指数</div></div>';
    h += '</div>';
    h += '<div class="kw-row">关键词：';
    (p.keywords||[]).forEach(k=>{h+='<span class="kw-tag">'+esc(k)+'</span>';});
    h += '</div>';
    h += '<div class="chart-duo">';
    h += '<div class="chart-col"><div class="chart-col-label">排名趋势变化</div><div class="chart-box"><canvas id="rk-'+tab+'-'+idx+'"></canvas></div></div>';
    h += '<div class="chart-col"><div class="chart-col-label">流量与交易趋势</div><div class="chart-box"><canvas id="tr-'+tab+'-'+idx+'"></canvas></div><div class="chart-legend"><span><span class="dot" style="background:#6366f1"></span>支付买家数</span><span><span class="dot" style="background:#f59e0b"></span>访客数</span></div></div>';
    h += '</div>';

  });

  c.innerHTML = h;

    list.forEach((p,idx)=>{

function drawChart(cid,labels,datasets,reverse){
  const cv=document.getElementById(cid); if(!cv)return;
  new Chart(cv.getContext('2d'),{
    type:'line',data:{labels,datasets:datasets.map(d=>({label:d.label,data:d.data,borderColor:d.color,backgroundColor:d.color+'10',borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:.4,fill:false}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxTicksLimit:4},grid:{display:false}},y:{ticks:{font:{size:10},maxTicksLimit:3},grid:{color:'#f3f4f6'},reverse:!!reverse}},interaction:{intersect:false,mode:'index'}}
  });
}
function renderInsights(tab){

  document.getElementById('insights-title').textContent = titles[tab];
  const items = [
    {icon:'🧭',label:'品类定位',text:ins.scene},{icon:'🧵',label:'材质趋势',text:ins.mat},
    {icon:'⚙️',label:'功能卖点',text:ins.feat},{icon:'🏷️',label:'品牌分布',text:ins.brand},
    {icon:'📈',label:'稳定性',text:ins.stable}
  ];
  let h=''; items.forEach(it=>{h+='<div class="insight-item"><div class="icn">'+it.icon+'</div><div class="txt"><strong>'+it.label+'</strong>：'+it.text+'</div></div>';});
  document.getElementById('insights-content').innerHTML = h;
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

  document.querySelector('[onclick="switchTab(\''+tab+'\')"]').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  renderProducts(tab); renderInsights(tab);
}
