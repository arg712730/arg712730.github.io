<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>洗图 v4</title>
<style>
body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5}
h1{color:#667eea;text-align:center}
.row{margin:12px 0}
label{display:inline-block;width:80px;font-size:14px;color:#666}
input[type=file]{margin:8px 0}
input[type=range]{width:200px}
button{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin:20px 0}
button:disabled{opacity:.5}
img{max-width:100%;max-height:300px;border-radius:8px;margin:8px 0}
#log{background:#1a1a2e;color:#0f0;padding:10px;border-radius:6px;font-family:monospace;font-size:11px;max-height:200px;overflow:auto}
#error{color:red;margin:8px 0;font-size:13px}
#result{display:none}
.loading{text-align:center;padding:20px}
</style>
</head>
<body>
<h1>🧼 FLUX 一键洗图 v4</h1>
<div id="error"></div>
<div class="row"><label>选择图片:</label> <input type="file" id="file" accept="image/png,image/jpeg"></div>
<div class="row"><label>预览:</label> <img id="preview" style="display:none"></div>
<div class="row"><label>降噪:</label> <input type="range" id="denoise" min="0.2" max="0.7" step="0.05" value="0.4"> <span id="denoiseVal">0.4</span></div>
<div class="row"><label>步数:</label> <input type="range" id="steps" min="10" max="40" step="5" value="20"> <span id="stepsVal">20</span></div>
<div class="row"><label>LoRA:</label> <input type="range" id="lora" min="0.3" max="1" step="0.05" value="0.65"> <span id="loraVal">0.65</span></div>
<button id="btn" disabled>🧼 开始洗图</button>
<div class="loading" id="loading" style="display:none">⏳ 处理中... <span id="timer"></span></div>
<div id="result">
  <h3>结果</h3>
  <p>原图: <img id="origImg"></p>
  <p>洗后: <img id="washImg"></p>
  <p>消耗: <span id="cost">-</span> | 剩余: <span id="bal">-</span> | 耗时: <span id="time">-</span></p>
  <p><a id="dl" href="#" download>下载</a></p>
</div>
<div id="log"></div>

<script src="wash_flow_remote.js"></script>
</body>
</html>
