<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗图工具</title>
<style>
body{font-family:Arial,sans-serif;max-width:500px;margin:60px auto;padding:30px;background:#f5f5f5;text-align:center}
.card{background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
h1{color:#667eea;font-size:28px;margin:0 0 8px}
.sub{color:#999;font-size:13px;margin-bottom:24px}
.btn{display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:18px;cursor:pointer;text-decoration:none;margin:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(102,126,234,.4)}
.btn:active{transform:translateY(0)}
.status{font-size:12px;color:#aaa;margin-top:24px}
.url{font-family:monospace;font-size:12px;background:#f0f0f0;padding:6px 10px;border-radius:6px;word-break:break-all;color:#666;margin-top:8px}
</style>
</head>
<body>
<div class="card">
<h1>🧼 FLUX 一键洗图</h1>
<p class="sub">去水印 · 提升质感 · 调色融图</p>
<p><a class="btn" id="link" href="#" target="_blank">🚀 打开洗图工具</a></p>
<p class="url" id="urlDisplay"></p>
<p class="status" id="status">⏳ 正在连接...</p>
</div>

<script>
var URLS = [
  'https://locks-listen-children-configured.trycloudflare.com'
];

async function check(url) {
  try {
    var res = await fetch(url + '/api/health', { mode: 'no-cors' });
    return true;
  } catch(e) {
    return false;
  }
}

async function main() {
  var found = false;
  for (var url of URLS) {
    document.getElementById('status').textContent = '⏳ 检测 ' + url + '...';
    // Simple check with timeout
    try {
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, 3000);
      var res = await fetch(url + '/api/health', { signal: controller.signal });
      clearTimeout(timeout);
      if (res.ok) {
        document.getElementById('link').href = url;
        document.getElementById('urlDisplay').textContent = url;
        document.getElementById('status').textContent = '✅ 服务在线';
        found = true;
        break;
      }
    } catch(e) {}
  }
  if (!found) {
    document.getElementById('status').textContent = '❌ 服务暂不可用，请联系安安';
    document.getElementById('link').style.opacity = '0.5';
    document.getElementById('link').onclick = function(e) { e.preventDefault(); alert('服务暂不可用'); };
  }
}

main();
</script>
</body>
</html>
