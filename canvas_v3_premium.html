<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI无限画布 Pro — 高级设计预览</title>
<style>
:root {
  --bg: #080b10;
  --surf: rgba(14, 17, 24, 0.82);
  --surf2: rgba(20, 24, 34, 0.88);
  --gold: #d4a853;
  --gold2: #f0d078;
  --rose: #c77d8d;
  --indigo: #7b8fc7;
  --teal: #6bb5a7;
  --text: #e2ded8;
  --dim: #787672;
  --line: rgba(255,255,255,.05);
  --glow-gold: 0 0 80px rgba(212,168,83,.1);
  --glow-rose: 0 0 60px rgba(199,125,141,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  height:100vh; overflow:hidden; font-weight: 340;
  -webkit-font-smoothing: antialiased;
}

/* Animated gradient bg */
body::before {
  content:''; position:fixed; inset:-50%;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(212,168,83,.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 78% 30%, rgba(123,143,199,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 55% at 65% 75%, rgba(199,125,141,.03) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 25% 70%, rgba(107,181,167,.03) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
  pointer-events:none; z-index:0;
}
@keyframes bgShift {
  0% { transform: translate(0,0) rotate(0deg); }
  50% { transform: translate(2%,-1%) rotate(.5deg); }
  100% { transform: translate(-1%,1%) rotate(-.3deg); }
}

/* Noise texture overlay */
body::after {
  content:''; position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.02'/%3E%3C/svg%3E");
  opacity:.6; pointer-events:none; z-index:0;
}

/* Dot grid */
#grid {
  position:fixed; inset:0; z-index:0; opacity:.04;
  background-image: radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ---- Toolbar ---- */
#toolbar {
  position:fixed; top:18px; left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:2px; align-items:center;
  background: var(--surf); backdrop-filter: blur(40px) saturate(140%);
  -webkit-backdrop-filter: blur(40px) saturate(140%);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 20px; padding: 5px 8px;
  box-shadow:
    0 4px 32px rgba(0,0,0,.5),
    0 1px 0 rgba(255,255,255,.04) inset,
    var(--glow-gold);
}
#toolbar button {
  position:relative; background:transparent; color: var(--dim);
  border:none; padding: 8px 12px; border-radius: 14px;
  cursor:pointer; font-size: 12px; font-weight: 400;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  letter-spacing:.01em; overflow:hidden;
}
#toolbar button::after {
  content:''; position:absolute; inset:0; border-radius:14px;
  background: linear-gradient(135deg, rgba(255,255,255,0), rgba(255,255,255,.03));
  opacity:0; transition: opacity .3s;
}
#toolbar button:hover { color: var(--text); background: rgba(255,255,255,.04); }
#toolbar button:hover::after { opacity:1; }
#toolbar button.primary {
  background: linear-gradient(135deg, #c49b3f 0%, #d4a853 40%, #e8c56d 100%);
  color:#1a1206; font-weight:520; border:none;
  box-shadow: 0 2px 16px rgba(180,140,50,.3), 0 1px 0 rgba(255,255,255,.2) inset;
}
#toolbar button.primary:hover {
  box-shadow: 0 4px 24px rgba(200,155,60,.45), 0 1px 0 rgba(255,255,255,.2) inset;
  transform: translateY(-1px);
}
#toolbar .sep { width:1px; height:22px; background: rgba(255,255,255,.06); margin:0 5px; }
.zoom-label { font-size:10.5px; color: var(--dim); min-width:42px; text-align:center; font-variant-numeric:tabular-nums; }

/* ---- Canvas area ---- */
#canvas { position:fixed; inset:0; z-index:1; overflow:hidden; }

/* ---- Nodes ---- */
.node {
  position:absolute; cursor:pointer; transition: filter .4s, box-shadow .4s;
  border-radius: 16px;
}
.node:hover { filter: brightness(1.06); }
.node img {
  display:block; border-radius: 16px;
  box-shadow:
    0 12px 48px rgba(0,0,0,.55),
    0 2px 8px rgba(0,0,0,.3);
  max-width:none;
}
.node .label {
  position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
  background: var(--surf); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--dim); font-size:10px; font-weight:400;
  padding: 4px 12px; border-radius: 10px;
  white-space:nowrap; max-width:200px;
  overflow:hidden; text-overflow:ellipsis;
  border: 1px solid rgba(255,255,255,.04);
}
.node.selected { outline: 2px solid var(--gold); outline-offset: 5px; border-radius: 6px; }

.node .badge {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  padding: 10px 24px; border-radius: 20px; font-size: 12px; font-weight:450;
  background: rgba(8,11,16,.75); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--gold2);
  border: 1px solid rgba(212,168,83,.12);
  letter-spacing:.02em;
}

/* ---- Gen Panel ---- */
#gen-panel {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.96);
  z-index:200; background: var(--surf2); backdrop-filter: blur(44px) saturate(160%);
  -webkit-backdrop-filter: blur(44px) saturate(160%);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 22px; padding: 26px; width: 430px;
  box-shadow:
    0 16px 64px rgba(0,0,0,.6),
    0 0 80px rgba(212,168,83,.06),
    0 1px 0 rgba(255,255,255,.03) inset;
  display:flex; flex-direction:column; gap:16px;
  opacity:1; pointer-events:auto;
}
#gen-panel::before {
  content:''; position:absolute; top:-1px; left:20px; right:20px; height:1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,83,.15), transparent);
  border-radius:1px;
}
#gen-panel h3 {
  font-size: 16px; font-weight: 480; color: var(--gold);
  letter-spacing:.01em; margin-bottom:2px;
}
#gen-panel textarea {
  width:100%; min-height:76px; background: rgba(0,0,0,.3); color: var(--text);
  border: 1px solid rgba(255,255,255,.06); border-radius: 14px;
  padding: 14px; font-size: 13px; line-height:1.6;
  resize:vertical; font-family:inherit; outline:none;
  transition: border-color .4s, box-shadow .4s;
}
#gen-panel textarea:focus {
  border-color: rgba(212,168,83,.35);
  box-shadow: 0 0 0 3px rgba(212,168,83,.06);
}
.row { display:flex; gap:10px; align-items:center; }
.row label { font-size:11.5px; color:var(--dim); min-width:54px; font-weight:420; }
.row select, .row input {
  flex:1; background: rgba(0,0,0,.25); color: var(--text);
  border: 1px solid rgba(255,255,255,.06); padding: 9px 12px;
  border-radius: 12px; font-size:12px; outline:none;
  transition: border-color .4s; cursor:pointer;
}
.row select:hover { border-color: rgba(255,255,255,.1); }
.row select:focus { border-color: rgba(212,168,83,.3); }

.btn-row { display:flex; gap:10px; justify-content:flex-end; margin-top:2px; }
.btn-gen {
  background: linear-gradient(135deg, #b88a30 0%, #d4a853 50%, #e0bc62 100%);
  color:#1a1206; border:none; padding:12px 28px; border-radius:14px;
  cursor:pointer; font-size:13.5px; font-weight:520; flex:1; letter-spacing:.01em;
  box-shadow: 0 2px 16px rgba(180,140,50,.25), 0 1px 0 rgba(255,255,255,.15) inset;
  transition: all .35s cubic-bezier(.4,0,.2,1);
}
.btn-gen:hover {
  box-shadow: 0 4px 28px rgba(200,155,60,.4), 0 1px 0 rgba(255,255,255,.15) inset;
  transform: translateY(-1px);
}
.btn-cancel {
  background: rgba(255,255,255,.03); color: var(--dim); border: 1px solid rgba(255,255,255,.05);
  padding: 12px 20px; border-radius: 14px; cursor:pointer;
  font-size:13px; transition: all .3s;
}
.btn-cancel:hover { background: rgba(255,255,255,.05); color: var(--text); }

/* ---- Side Panel ---- */
#side-panel {
  position:fixed; right:20px; top:50%; transform:translateY(-50%);
  z-index:150; background: var(--surf); backdrop-filter: blur(36px) saturate(140%);
  -webkit-backdrop-filter: blur(36px) saturate(140%);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 20px; padding: 0; width: 280px;
  box-shadow:
    0 12px 48px rgba(0,0,0,.5),
    0 1px 0 rgba(255,255,255,.03) inset,
    var(--glow-rose);
  overflow:hidden;
}
#side-panel .sp-header {
  padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,.05);
  font-size:14px; font-weight:480; color: var(--rose);
  letter-spacing:.01em;
}
#side-panel .sp-body { padding: 18px 20px; display:flex; flex-direction:column; gap:14px; }
.sp-stat { display:flex; justify-content:space-between; align-items:center; font-size:12.5px; }
.sp-stat span:first-child { color: var(--dim); }
.sp-stat span:last-child { color: var(--text); font-weight:460; font-variant-numeric:tabular-nums; }
.sp-stat em { color: var(--gold); font-style:normal; }

.sp-tag {
  display:inline-flex; align-items:center; gap:4px;
  padding: 5px 12px; border-radius: 16px; font-size:11px; font-weight:440;
  border: 1px solid rgba(255,255,255,.06); cursor:pointer;
  transition: all .3s;
}
.sp-tag.on {
  background: linear-gradient(135deg, rgba(212,168,83,.18), rgba(212,168,83,.06));
  border-color: rgba(212,168,83,.25); color: var(--gold2);
}
.sp-tag:not(.on) { color: var(--dim); background: rgba(255,255,255,.02); }
.sp-tag:hover { border-color: rgba(255,255,255,.12); }

.sp-prompt {
  padding: 10px 14px; border-radius: 12px; font-size:11px; color: var(--dim);
  background: rgba(255,255,255,.02); cursor:pointer;
  transition: all .3s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  border: 1px solid transparent;
}
.sp-prompt:hover { background: rgba(255,255,255,.04); color: var(--text); border-color: rgba(255,255,255,.05); }

/* ---- Minimap ---- */
#minimap {
  position:fixed; bottom:24px; left:24px; z-index:100;
  width:160px; height:108px; background: var(--surf);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 16px; overflow:hidden; opacity:.45;
  transition: all .4s;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
#minimap:hover { opacity:1; transform:translateY(-2px); }

/* ---- Toast ---- */
#toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(8px);
  z-index:300; background: var(--surf2); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.06);
  padding: 10px 24px; border-radius: 20px; font-size:12.5px; font-weight:400;
  box-shadow: 0 4px 24px rgba(0,0,0,.4);
  opacity:1; transition: all .4s cubic-bezier(.34,1.56,.64,1);
}

/* ---- Hints ---- */
.hints {
  position:fixed; bottom:24px; right:24px; z-index:90;
  font-size:10.5px; color: rgba(255,255,255,.12); text-align:right;
  line-height:1.9; pointer-events:none; letter-spacing:.02em;
}
</style>
</head>
