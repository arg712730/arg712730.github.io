body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#F2F2F2;color:#111;min-height:100vh}
.topbar{width:100%;height:56px;background:#161717;display:flex;align-items:center;padding:0 50px}
.topbar .brand{color:#fff;font-size:14px;font-weight:500;letter-spacing:.5px}
.wrap{max-width:1200px;margin:0 auto;padding:12px 50px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px}
.kpi-card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-label{font-size:12px;color:#8B8FA3;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:#111;line-height:1.2}
.kpi-sub{font-size:12px;color:#8B8FA3;margin-top:4px}
.kpi-sub .up{color:#16A34A}.kpi-sub .down{color:#DC2626}
.kpi-row2{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.kpi-row2 .kpi-card{padding:14px 16px}
.kpi-row2 .kpi-value{font-size:22px}
.tabs{margin-top:0;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tab-nav{display:flex;border-bottom:1px solid #f0f0f0;padding:0 12px;background:#fff;border-radius:8px 8px 0 0;position:sticky;top:0;z-index:30}
.tab-btn{flex:1;padding:16px 12px;text-align:center;cursor:pointer;border:none;background:transparent;font-size:14px;font-weight:500;color:#8B8FA3;transition:color .2s;position:relative}
.tab-btn:hover{color:#1664FF}
.tab-btn.on{color:#1664FF;font-weight:600}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:#1664FF;border-radius:2px}
.tab-panel{display:none}
.tab-panel.on{display:block}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px 24px}
.chart-box{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px}
.chart-title{font-size:14px;font-weight:600;color:#111;margin-bottom:12px}
.chart-wrap{height:280px}
.chart-wrap canvas{width:100%!important;height:100%!important}
.table-section{padding:0 24px 24px}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.table-header h3{font-size:16px;font-weight:600}
.table-count{font-size:12px;color:#8B8FA3}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{background:#F8F9FC;color:#8B8FA3;font-weight:500;padding:10px 12px;text-align:left;border-bottom:1px solid #e5e5e5;position:sticky;top:48px;z-index:10}
.data-table thead th.num{text-align:right}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid #f5f5f5}
.data-table tbody td.num{text-align:right;font-variant-numeric:tabular-nums}
.data-table tbody tr:hover{background:#FAFBFC}
.data-table .prod-name{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.data-table .prod-id{font-size:11px;color:#A3A3A3;font-family:monospace}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:500;margin-right:4px}
.tag-new{background:#DCFCE7;color:#16A34A}
.tag-gone{background:#FEE2E2;color:#DC2626}
.tag-hot{background:#FEF3C7;color:#D97706}
.diff-up,.trend-up{color:#16A34A;font-weight:600}
.diff-down,.trend-down{color:#DC2626;font-weight:600}
.diff-flat,.trend-flat{color:#8B8FA3}
.seg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.seg-card{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:16px}
.seg-card h4{font-size:14px;font-weight:600;margin-bottom:8px}
.seg-stat{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.seg-stat .lbl{color:#8B8FA3}
.seg-stat .val{color:#111;font-weight:500}
.seg-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-top:8px}
.seg-bar-fill{height:100%;border-radius:2px}
.insight-block{padding:20px 24px;border-top:1px solid #f0f0f0}
.insight-title{font-size:14px;font-weight:600;margin-bottom:12px}
.insight-item{display:flex;gap:8px;font-size:13px;color:#4b5563;line-height:1.6;margin-bottom:6px}
.insight-icon{flex-shrink:0;font-size:14px}
.footer{text-align:center;padding:24px;color:#9CA3AF;font-size:12px}
